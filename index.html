<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MPOC Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>MPOC Final</h1>
  <p>Mixue Perlis Operations Control</p>
  <p>Planning • Packing • Runner • Closing • Boss Dashboard</p>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>

<script>
function visibleRole(staff) {
  if (!staff) return "-";
  return staff.TodayRole || staff.FixedRole || "OutletStaff";
}

function showLogin() {
  const activeStaff = MPOC.staffMaster.filter(s => s.Status === "Active");

  $("app").innerHTML = `
    <div class="box">
      <h2>Staff Login</h2>
      <p class="small">Select your name. Role and outlet are controlled by system.</p>

      <label>Staff Name</label>
      <select id="staffSelect" onchange="updateStaffPreview()">
        <option value="">-- Select Staff Name --</option>
        ${activeStaff.map(s => `<option value="${s.StaffID}">${s.Name}</option>`).join("")}
      </select>

      <label>Outlet</label>
      <input id="outletPreview" value="-" readonly>

      <label>Role</label>
      <input id="rolePreview" value="-" readonly>

      <label>PIN Code</label>
      <input type="password" id="pin" placeholder="Enter PIN">

      <button class="btn-primary" onclick="login()">Login</button>

      <div class="notice">
        Staff cannot choose Admin / Boss / System Controller manually.<br>
        Role is controlled by StaffMaster.
      </div>
    </div>
  `;
}

function updateStaffPreview() {
  const staffId = $("staffSelect").value;
  const staff = MPOC.staffMaster.find(s => s.StaffID === staffId);
  $("outletPreview").value = staff ? staff.Outlet : "-";
  $("rolePreview").value = staff ? visibleRole(staff) : "-";
}

function login() {
  const staffId = $("staffSelect").value;
  const pin = $("pin").value.trim();
  const staff = MPOC.staffMaster.find(s => s.StaffID === staffId);

  if (!staff) return alert("Please select Staff Name.");
  if (staff.Status !== "Active") return alert("This staff account is not active.");
  if (!pin) return alert("Please enter PIN.");
  if (pin !== staff.PIN) return alert("Wrong PIN.");

  const loginData = {
    staffId: staff.StaffID,
    name: staff.Name,
    outlet: staff.Outlet,
    role: visibleRole(staff),
    fixedRole: staff.FixedRole,
    todayRole: staff.TodayRole,
    loginTime: new Date().toLocaleString()
  };

  localStorage.setItem("mixueCurrentStaff", JSON.stringify(loginData));
  showHome();
}

function logout() {
  localStorage.removeItem("mixueCurrentStaff");
  showLogin();
}

function showHome() {
  const staff = getStaff();
  if (!staff) return showLogin();

  $("app").innerHTML = `
    ${nav()}

    <div class="box">
      <h2>Welcome, ${staff.name}</h2>
      <p class="small">${staff.outlet} • ${staff.role}</p>
      <button class="btn-grey" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard">
      <div class="dash-card"><h3>System</h3><p>Final</p></div>
      <div class="dash-card"><h3>Backend</h3><p>Sheet</p></div>
      <div class="dash-card"><h3>Mode</h3><p>Live</p></div>
      <div class="dash-card"><h3>Role</h3><p style="font-size:15px">${staff.role}</p></div>
    </div>

    <div class="box">
      <h2>MPOC Event Flow</h2>

      <div class="nav-grid">
        <div class="nav-card">
          <b>1. Planning / Packing</b>
          <p>Create event stock, boxes and HQ WhatsApp format.</p>
          <button class="btn-primary" onclick="location.href='packing-final.html'">Open Packing</button>
        </div>

        <div class="nav-card">
          <b>2. Runner</b>
          <p>Runner update pickup, on route, delivered and returned.</p>
          <button class="btn-purple" onclick="location.href='runner-final.html'">Open Runner</button>
        </div>

        <div class="nav-card">
          <b>3. Closing</b>
          <p>Cash, QR, sold, leftover, wastage and closing summary.</p>
          <button class="btn-green" onclick="location.href='closing-final.html'">Open Closing</button>
        </div>

        <div class="nav-card">
          <b>4. Admin / Boss</b>
          <p>Simple overview for boss and system controller.</p>
          <button class="btn-blue" onclick="location.href='admin-final.html'">Open Dashboard</button>
        </div>
      </div>

      <div class="notice">Login role is now controlled by StaffMaster.</div>
    </div>
  `;
}

showHome();
</script>

</body>
</html>
