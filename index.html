<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MPOC Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <h1>MPOC Final</h1>
  <p>Mixue Perlis Operations Control</p>
  <p>Planning • Packing • Runner • Closing • Boss Dashboard</p>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>

<script>
function visibleRole(staff) {
  if (!staff) return "-";
  return staff.TodayRole || staff.FixedRole || "OutletStaff";
}

function showLogin() {
  const activeStaff = MPOC.staffMaster.filter(s => s.Status === "Active");

  $("app").innerHTML = `
    <div class="box">
      <h2>Staff Login</h2>
      <p class="small">Select your name. Role and outlet are controlled by system.</p>

      <label>Staff Name</label>
      <select id="staffSelect" onchange="updateStaffPreview()">
        <option value="">-- Select Staff Name --</option>
        ${activeStaff.map(s => `<option value="${s.StaffID}">${s.Name}</option>`).join("")}
      </select>

      <label>Outlet</label>
      <input id="outletPreview" value="-" readonly>

      <label>Role</label>
      <input id="rolePreview" value="-" readonly>

      <label>PIN Code</label>
      <input type="password" id="pin" placeholder="Enter PIN">

      <button class="btn-primary" onclick="login()">Login</button>

      <div class="notice">
        Staff cannot choose Admin / Boss / System Controller manually.<br>
        Role is controlled by StaffMaster.
      </div>
    </div>
  `;
}

function updateStaffPreview() {
  const staffId = $("staffSelect").value;
  const staff = MPOC.staffMaster.find(s => s.StaffID === staffId);
  $("outletPreview").value = staff ? staff.Outlet : "-";
  $("rolePreview").value = staff ? visibleRole(staff) : "-";
}

function login() {
  const staffId = $("staffSelect").value;
  const pin = $("pin").value.trim();
  const staff = MPOC.staffMaster.find(s => s.StaffID === staffId);

  if (!staff) return alert("Please select Staff Name.");
  if (staff.Status !== "Active") return alert("This staff account is not active.");
  if (!pin) return alert("Please enter PIN.");
  if (pin !== staff.PIN) return alert("Wrong PIN.");

  const loginData = {
    staffId: staff.StaffID,
    name: staff.Name,
    outlet: staff.Outlet,
    role: visibleRole(staff),
    fixedRole: staff.FixedRole,
    todayRole: staff.TodayRole,
    loginTime: new Date().toLocaleString()
  };

  localStorage.setItem("mixueCurrentStaff", JSON.stringify(loginData));
  showHome();
}

function logout() {
  localStorage.removeItem("mixueCurrentStaff");
  showLogin();
}

function canAccess(role, moduleName) {
  const r = (role || "").replace(/\s+/g, "").toLowerCase();

  if (r === "systemcontroller" || r === "admin") return true;

  if (r === "boss") {
    return moduleName === "dashboard";
  }

  if (r === "runner") {
    return moduleName === "runner";
  }

  if (r === "boothcrew") {
    return moduleName === "packing" || moduleName === "closing";
  }

  if (r === "outletcrew") {
    return moduleName === "packing" || moduleName === "closing";
  }

  if (r === "outletstaff" || r === "partimerstaff") {
    return moduleName === "packing" || moduleName === "closing";
  }

  return moduleName === "packing";
}

function moduleCard(moduleName, title, description, btnClass, btnText, link) {
  return `
    <div class="nav-card">
      <b>${title}</b>
      <p>${description}</p>
      <button class="${btnClass}" onclick="location.href='${link}'">${btnText}</button>
    </div>
  `;
}

function showHome() {
  const staff = getStaff();
  if (!staff) return showLogin();

  const role = staff.role;

  let cards = "";

  if (canAccess(role, "packing")) {
    cards += moduleCard(
      "packing",
      "1. Planning / Packing",
      "Create event stock, boxes and HQ WhatsApp format.",
      "btn-primary",
      "Open Packing",
      "packing-final.html"
    );
  }

  if (canAccess(role, "runner")) {
    cards += moduleCard(
      "runner",
      "2. Runner",
      "Update pickup, on route, delivered and returned.",
      "btn-purple",
      "Open Runner",
      "runner-final.html"
    );
  }

  if (canAccess(role, "closing")) {
    cards += moduleCard(
      "closing",
      "3. Closing",
      "Cash, QR, sold, leftover, wastage and closing summary.",
      "btn-green",
      "Open Closing",
      "closing-final.html"
    );
  }

  if (canAccess(role, "dashboard")) {
    cards += moduleCard(
      "dashboard",
      "4. Admin / Boss Dashboard",
      "Overview for boss, admin and system controller.",
      "btn-blue",
      "Open Dashboard",
      "admin-final.html"
    );
  }

  if (!cards) {
    cards = `<div class="warning">No module assigned for today. Please contact Admin / System Controller.</div>`;
  }

  $("app").innerHTML = `
    ${nav()}

    <div class="box">
      <h2>Welcome, ${staff.name}</h2>
      <p class="small">${staff.outlet} • ${staff.role}</p>
      <button class="btn-grey" onclick="logout()">Logout</button>
    </div>

    <div class="dashboard">
      <div class="dash-card"><h3>System</h3><p>Final</p></div>
      <div class="dash-card"><h3>Backend</h3><p>Sheet</p></div>
      <div class="dash-card"><h3>Mode</h3><p>Live</p></div>
      <div class="dash-card"><h3>Role</h3><p style="font-size:15px">${staff.role}</p></div>
    </div>

    <div class="box">
      <h2>MPOC Event Flow</h2>
      <div class="nav-grid">${cards}</div>

      <div class="notice">
        Role Based UI is active.<br>
        TodayRole will override FixedRole when assigned in StaffMaster.
      </div>
    </div>
  `;
}

showHome();
</script>

</body>
</html>
