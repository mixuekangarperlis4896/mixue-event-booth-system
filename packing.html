<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mixue Packing System V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      margin: 0;
      color: #222;
    }

    .header {
      background: linear-gradient(135deg, #d60000, #ff3b3b);
      color: white;
      padding: 22px 18px;
      border-radius: 0 0 24px 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 6px 0 0;
      opacity: 0.9;
    }

    .container {
      padding: 18px;
      max-width: 680px;
      margin: auto;
    }

    .box {
      background: white;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h2, h3 {
      margin-top: 0;
      color: #d60000;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-primary {
      background: #d60000;
      color: white;
    }

    .btn-secondary {
      background: white;
      color: #d60000;
      border: 1px solid #d60000;
    }

    .btn-green {
      background: #118c37;
      color: white;
    }

    .btn-grey {
      background: #e5e5e5;
      color: #333;
    }

    .item-row {
      background: #fafafa;
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid #eee;
    }

    .box-card {
      border: 2px solid #f0d0d0;
      background: #fff;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .small {
      font-size: 13px;
      color: #777;
    }

    .label-preview {
      background: #fff;
      border: 2px dashed #d60000;
      padding: 18px;
      border-radius: 18px;
      white-space: pre-line;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      height: 380px;
      border-radius: 14px;
      border: 1px solid #ddd;
      padding: 14px;
      font-size: 14px;
    }

    .action-buttons{
  position:sticky;
  bottom:20px;
  z-index:9999;
  background:white;
  padding:14px;
  border-radius:18px;
  box-shadow:0 -4px 20px rgba(0,0,0,0.15);
  margin-top:20px;
}

.container{
  padding-bottom:220px !important;
}
    
  </style>
</head>

<body>

<div class="header">
  <h1>Mixue Packing System V2</h1>
  <p>Multiple Box • Checked By • Google Sheet</p>
</div>

<div class="container">
  <div id="app"></div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwJnWzuAQqw44aq_-tL3GfLb2uXPOojaC2Ba2dfxiZWdqwYwkSHKirAzTy1qNBku5YG/exec";

const products = [
  "Lemonade",
  "Lemon Jasmine Tea",
  "Lemon Black Tea",
  "Kiwi Jasmine Tea",
  "Fresh Orange",
  "Strawberry Bobo",
  "Strawberry Peach",
  "Peach Jasmine Tea",
  "Milk Tea L",
  "Milk Tea M",
  "Taro Grape",
  "Toffee Hazelnut Latte",
  "Ice Cream Toffee Hazelnut Latte",
  "Kiwi Creamy Drink",
  "Brown Sugar Latte",
  "Strawberry Creamy Drink",
  "Mango Brulee",
  "Toffee Lava Brulee",
  "Original Sundae",
  "Taro Sundae",
  "Taro Ice Cream Cone"
];

let boxes = [
  {
    boxNo: "Box 1",
    boxType: "L Cup Box",
    items: [
      { product: "Lemonade", qty: 0 }
    ]
  }
];

function showForm() {
  document.getElementById("app").innerHTML = `
    <div class="box">
      <h2>1. Packing Info</h2>

      <label>Date</label>
      <input type="date" id="date">

      <label>Event Name</label>
      <input type="text" id="eventName" placeholder="Follow event banner name">

      <label>Location</label>
      <select id="locationSelect" onchange="toggleOtherLocation()">
        <option>UniMAP Unicity Padang Besar</option>
        <option>UniMAP Wang Ulu</option>
        <option>UniMAP PF 1</option>
        <option>Politeknik Pauh</option>
        <option>UiTM Arau</option>
        <option>Other Location</option>
      </select>

      <div id="otherLocationBox" style="display:none;">
        <label>Other Location</label>
        <input type="text" id="otherLocation" placeholder="Write event location">
      </div>

      <label>Checked By</label>
      <input type="text" id="checkedBy" placeholder="Staff name">

      <h2 style="margin-top:24px;">2. Boxes</h2>
      <p class="small">Add all boxes for this event.</p>

      <div id="boxesArea"></div>

      <button class="btn-secondary" onclick="addBox()">+ Add Box</button>
      <button class="btn-primary" onclick="generateAllLabels()">Generate All Labels</button>
    </div>
  `;

  document.getElementById("date").valueAsDate = new Date();
  renderBoxes();
}

function toggleOtherLocation() {
  let value = document.getElementById("locationSelect").value;
  document.getElementById("otherLocationBox").style.display =
    value === "Other Location" ? "block" : "none";
}

function renderBoxes() {
  let html = "";

  boxes.forEach((box, boxIndex) => {
    html += `
      <div class="box-card">
        <h3>${box.boxNo}</h3>

        <div class="grid">
          <div>
            <label>Box No</label>
            <input type="text" value="${box.boxNo}" onchange="boxes[${boxIndex}].boxNo=this.value">
          </div>

          <div>
            <label>Box Type</label>
            <select onchange="boxes[${boxIndex}].boxType=this.value">
              ${boxTypeOptions(box.boxType)}
            </select>
          </div>
        </div>

        <h3 style="margin-top:18px;">Items</h3>
        <div id="items_${boxIndex}">
          ${renderItems(boxIndex)}
        </div>

        <button class="btn-secondary" onclick="addItem(${boxIndex})">+ Add Item</button>
        <button class="btn-grey" onclick="removeBox(${boxIndex})">Remove This Box</button>
      </div>
    `;
  });

  document.getElementById("boxesArea").innerHTML = html;
}

function boxTypeOptions(selected) {
  const types = [
    "L Cup Box",
    "M Cup Box",
    "U Cup Sundae Box",
    "Mixed Box",
    "Accessories Box"
  ];

  return types.map(t =>
    `<option value="${t}" ${t === selected ? "selected" : ""}>${t}</option>`
  ).join("");
}

function productOptions(selected) {
  return products.map(p =>
    `<option value="${p}" ${p === selected ? "selected" : ""}>${p}</option>`
  ).join("");
}

function renderItems(boxIndex) {
  let html = "";

  boxes[boxIndex].items.forEach((item, itemIndex) => {
    html += `
      <div class="item-row">
        <label>Product</label>
        <select onchange="boxes[${boxIndex}].items[${itemIndex}].product=this.value">
          ${productOptions(item.product)}
        </select>

        <label>Qty</label>
        <input type="number" value="${item.qty}" min="0"
          onchange="boxes[${boxIndex}].items[${itemIndex}].qty=Number(this.value || 0)">

        <button class="btn-secondary" onclick="removeItem(${boxIndex}, ${itemIndex})">Remove Item</button>
      </div>
    `;
  });

  return html;
}

function addBox() {
  boxes.push({
    boxNo: "Box " + (boxes.length + 1),
    boxType: "Mixed Box",
    items: [
      { product: "Lemonade", qty: 0 }
    ]
  });

  renderBoxes();
}

function removeBox(boxIndex) {
  if (boxes.length === 1) {
    alert("At least 1 box is required.");
    return;
  }

  boxes.splice(boxIndex, 1);
  renderBoxes();
}

function addItem(boxIndex) {
  boxes[boxIndex].items.push({
    product: "Lemonade",
    qty: 0
  });

  renderBoxes();
}

function removeItem(boxIndex, itemIndex) {
  if (boxes[boxIndex].items.length === 1) {
    alert("At least 1 item is required.");
    return;
  }

  boxes[boxIndex].items.splice(itemIndex, 1);
  renderBoxes();
}

function getLocation() {
  let selected = document.getElementById("locationSelect").value;

  if (selected === "Other Location") {
    return document.getElementById("otherLocation").value;
  }

  return selected;
}

function getTotalQty(box) {
  return box.items.reduce((sum, item) => sum + Number(item.qty || 0), 0);
}

function validateData() {
  let eventName = document.getElementById("eventName").value;
  let checkedBy = document.getElementById("checkedBy").value;
  let location = getLocation();

  if (!eventName || !checkedBy || !location) {
    alert("Please fill Event Name, Location and Checked By.");
    return false;
  }

  for (let box of boxes) {
    if (!box.boxNo || getTotalQty(box) <= 0) {
      alert("Every box must have Box No and at least 1 item quantity.");
      return false;
    }
  }

  return true;
}

function generateLabelText() {
  let date = document.getElementById("date").value;
  let eventName = document.getElementById("eventName").value;
  let location = getLocation();
  let checkedBy = document.getElementById("checkedBy").value;

  let text = `Packing Report\n`;
  text += `Date: ${date}\n`;
  text += `Event: ${eventName}\n`;
  text += `Location: ${location}\n`;
  text += `Checked By: ${checkedBy}\n\n`;

  boxes.forEach((box, boxIndex) => {
    text += `${box.boxNo} / ${box.boxType}\n`;
    text += `Total Qty: ${getTotalQty(box)}\n`;

    box.items
      .filter(item => Number(item.qty) > 0)
      .forEach((item, itemIndex) => {
        text += `${itemIndex + 1}. ${item.product} (${item.qty})\n`;
      });

    if (boxIndex !== boxes.length - 1) {
      text += `\n`;
    }
  });

  return text;
}

function generateAllLabels() {
  if (!validateData()) return;

  let label = generateLabelText();

  document.getElementById("app").innerHTML = `
    <div class="box">
      <h2>Box Label Preview</h2>

      <div class="label-preview">
        ${label.replace(/\n/g, "<br>")}
      </div>

      <div class="action-buttons">

        <button
          type="button"
          class="btn-green"
          onclick="saveAllBoxes()"
          ontouchstart="saveAllBoxes()"
          style="
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            background:#118c37;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-bottom:12px;
            cursor:pointer;
          ">
          Save All Boxes to Google Sheet
        </button>

        <button
          type="button"
          class="btn-primary"
          onclick="copyLabel()"
          ontouchstart="copyLabel()"
          style="
            width:100%;
            padding:16px;
            border:none;
            border-radius:16px;
            background:#d60000;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-bottom:12px;
            cursor:pointer;
          ">
          Copy Packing Report
        </button>

        <button
          type="button"
          class="btn-secondary"
          onclick="showForm()"
          ontouchstart="showForm()"
          style="
            width:100%;
            padding:16px;
            border:2px solid #d60000;
            border-radius:16px;
            background:white;
            color:#d60000;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
          ">
          Back / Edit
        </button>

      </div>
    </div>
  `;
}

function copyLabel() {
  let label = generateLabelText();

  navigator.clipboard.writeText(label).then(() => {
    if (navigator.vibrate) {
      navigator.vibrate([80, 40, 80]);
    }
    alert("✅ Packing Report copied!");
  });
}

async function saveAllBoxes() {
  let date = document.getElementById("date").value;
  let eventName = document.getElementById("eventName").value;
  let location = getLocation();
  let checkedBy = document.getElementById("checkedBy").value;

  try {
    for (let box of boxes) {
      let payload = {
        type: "packing",
        date: date,
        eventName: eventName,
        location: location,
        boxNo: box.boxNo,
        boxType: box.boxType,
        packedBy: checkedBy,
        totalQty: getTotalQty(box),
        items: box.items.filter(item => Number(item.qty) > 0)
      };

      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      });
    }

    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }

    alert("✅ All boxes saved to Google Sheet!");

  } catch (err) {
    alert("❌ Failed to save.");
    console.log(err);
  }
}

showForm();
</script>

</body>
</html>
