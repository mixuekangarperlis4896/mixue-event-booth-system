<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mixue Packing System V10 Beta</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,sans-serif;
background:#f6f6f6;
margin:0;
padding:0;
}

.header{
background:#d60000;
color:white;
padding:20px;
border-radius:0 0 20px 20px;
}

.container{
padding:18px;
max-width:700px;
margin:auto;
padding-bottom:220px;
}

.box{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:16px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
margin-top:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn-red{
background:#d60000;
color:white;
}

.btn-green{
background:#118c37;
color:white;
}

.btn-grey{
background:#e5e5e5;
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:6px;
margin-bottom:12px;
}

.warning{
background:#ffe6e6;
color:#d60000;
padding:12px;
border-radius:12px;
font-weight:bold;
margin-top:12px;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.card{
background:white;
padding:16px;
border-radius:16px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

.action-buttons{
position:sticky;
bottom:20px;
background:white;
padding:14px;
border-radius:18px;
box-shadow:0 -4px 20px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="header">
<h1>Mixue Packing System V10 Beta</h1>
<p>Smart Capacity • HQ Format • Dashboard</p>
</div>

<div class="container">

<div class="dashboard">
<div class="card">
<h3>Total Boxes</h3>
<p id="totalBoxes">0</p>
</div>

<div class="card">
<h3>Total Cups</h3>
<p id="totalCups">0</p>
</div>
</div>

<div class="box">
<label>Event Name</label>
<input type="text" id="eventName">

<label>Checked By</label>
<input type="text" id="checkedBy">

<label>Box Type</label>
<select id="boxType">
<option>L Cup Box</option>
<option>M Cup Box</option>
<option>U Cup Sundae Box</option>
</select>

<label>Product</label>
<input type="text" id="product">

<label>Quantity</label>
<input type="number" id="qty">

<button class="btn-red" onclick="addItem()">Add Item</button>

<div id="warning"></div>
<div id="result"></div>
</div>

<div class="action-buttons">
<button class="btn-green" onclick="copyHQFormat()">Copy HQ Format</button>
<button class="btn-grey" onclick="resetAll()">Reset</button>
</div>

</div>

<script>
let items=[];

function getCapacity(type){
if(type==='L Cup Box') return 39;
if(type==='M Cup Box') return 40;
if(type==='U Cup Sundae Box') return 56;
return 0;
}

function addItem(){
const boxType=document.getElementById('boxType').value;
const product=document.getElementById('product').value;
const qty=Number(document.getElementById('qty').value);

items.push({boxType,product,qty});

render();
}

function render(){
let html='';
let total=0;
let totalBoxes=0;

const warning=document.getElementById('warning');
warning.innerHTML='';

items.forEach((item,index)=>{
html+=`<div class="box">
<b>${item.product}</b><br>
${item.qty} cups<br>
${item.boxType}
</div>`;

const max=getCapacity(item.boxType);

if(item.qty>max){
warning.innerHTML+=`<div class="warning">
⚠ ${item.product} exceeded ${item.boxType} limit!<br>
Max: ${max} cups
</div>`;
}

if(item.qty>0){
totalBoxes++;
total+=item.qty;
}
});

document.getElementById('result').innerHTML=html;
document.getElementById('totalBoxes').innerHTML=totalBoxes;
document.getElementById('totalCups').innerHTML=total;
}

function copyHQFormat(){
const eventName=document.getElementById('eventName').value;

let text=`Order for ${eventName}\n\n`;

items.forEach((item,index)=>{
text+=`${index+1}. ${item.product} (${item.qty})\n`;
});

navigator.clipboard.writeText(text);
alert('HQ Format Copied!');
}

function resetAll(){
items=[];
render();
}
</script>

</body>
</html>
